<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hero Animation</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden;
            background: #0a1f5c;
        }
        .fluid-container {
            width: 100%; height: 100%;
            background: linear-gradient(120deg, #0a1f5c, #051022, #1742b8, #0a1f5c);
            background-size: 300% 300%;
            animation: gradient-flow 8s ease infinite;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            animation: float 8s ease-in-out infinite alternate;
        }
        .orb1 {
            width: 60vw; height: 60vw;
            background: rgba(23, 66, 184, 0.4);
            top: -10vw; left: -10vw;
            animation-duration: 9s;
        }
        .orb2 {
            width: 70vw; height: 70vw;
            background: rgba(5, 29, 92, 0.7);
            bottom: -15vw; right: -10vw;
            animation-delay: -4s;
            animation-duration: 11s;
        }
        @keyframes gradient-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(8vw, 6vw) scale(1.15); }
        }
    </style>
</head>
<body>
    <div class="fluid-container">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
    </div>
</body>
</html>
